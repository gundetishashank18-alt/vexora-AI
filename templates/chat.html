<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vexora AI - Created by Shashank</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f7f7f8; color: #0d0d0d; height: 100vh; display: flex;
        }
        .sidebar {
            width: 260px; background: #ffffff; border-right: 1px solid #e5e5e5;
            padding: 12px; display: flex; flex-direction: column; justify-content: space-between;
        }
        .logo {
            padding: 12px; font-size: 20px; font-weight: 700; color: #19c37d;
            display: flex; align-items: center; gap: 10px;
        }
        .new-chat-btn {
            padding: 12px; background: #19c37d; color: white; border: none;
            border-radius: 8px; cursor: pointer; font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 10px; margin: 10px 0;
        }
        .new-chat-btn:hover { background: #16a870; }
        .user-info { padding: 12px; font-size: 14px; color: #6b6b6b; }
        .logout-btn {
            padding: 12px; border: 1px solid #e5e5e5; border-radius: 8px;
            cursor: pointer; text-align: center; text-decoration: none; color: #0d0d0d;
        }
        .logout-btn:hover { background: #f0f0f0; }
        .main {
            flex: 1; display: flex; flex-direction: column; height: 100vh; background: #ffffff;
        }
        .chat-area {
            flex: 1; overflow-y: auto; padding: 24px 0;
            display: flex; flex-direction: column; align-items: center;
        }
        .message-wrapper {
            width: 100%; max-width: 800px; padding: 20px 24px;
            display: flex; gap: 20px;
        }
        .user-msg { background: #f7f7f8; }
        .avatar {
            width: 30px; height: 30px; border-radius: 4px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .user-avatar { background: #5436da; color: white; }
        .bot-avatar { background: #19c37d; color: white; }
        .message-content { line-height: 1.75; white-space: pre-wrap; flex: 1; }
        .input-area {
            padding: 24px; display: flex; justify-content: center; border-top: 1px solid #e5e5e5;
        }
        .input-box {
            width: 100%; max-width: 800px; background: #ffffff;
            border: 1px solid #d1d1d1; border-radius: 12px; padding: 12px;
            display: flex; align-items: flex-end; gap: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        #userInput {
            flex: 1; background: transparent; border: none; color: #0d0d0d;
            font-size: 16px; outline: none; resize: none; max-height: 200px; font-family: inherit;
        }
        #sendBtn {
            background: #19c37d; border: none; border-radius: 8px;
            width: 32px; height: 32px; cursor: pointer; color: white;
        }
        #sendBtn:disabled { background: #d1d1d1; cursor: not-allowed; }
        .welcome { text-align: center; margin-top: 20vh; max-width: 600px; }
        .welcome h1 { font-size: 36px; margin-bottom: 16px; color: #0d0d0d; }
        .welcome p { color: #6b6b6b; font-size: 16px; }
        .typing { display: flex; gap: 4px; align-items: center; }
        .typing span {
            width: 8px; height: 8px; background: #6b6b6b; border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing span:nth-child(1) { animation-delay: -0.32s; }
        .typing span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1.0); } }
        .created-by {
            position: fixed; bottom: 10px; right: 20px; font-size: 12px; color: #6b6b6b;
        }
        @media (max-width: 768px) {.sidebar { display: none; } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div>
            <div class="logo">
                <i class="fa-solid fa-bolt"></i> Vexora AI
            </div>
            <button class="new-chat-btn" onclick="location.reload()">
                <i class="fa-solid fa-plus"></i> New Chat
            </button>
            <div class="user-info">
                <i class="fa-solid fa-user"></i> Welcome, {{ username }}
            </div>
        </div>
        <a href="/logout" class="logout-btn">Logout</a>
    </div>

    <div class="main">
        <div class="chat-area" id="chatArea">
            <div class="welcome" id="welcome">
                <h1>Vexora</h1>
                <p>Namaste mama 💚 Em kavali?</p>
            </div>
        </div>
        <div class="input-area">
            <div class="input-box">
                <textarea id="userInput" placeholder="Message Vexora..." rows="1" onkeydown="if(event.key==='Enter' && !event.shiftKey) {event.preventDefault(); sendMessage();}"></textarea>
                <button id="sendBtn" onclick="sendMessage()">
                    <i class="fa-solid fa-arrow-up"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="created-by">Created by Shashank 💚</div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const welcome = document.getElementById('welcome');

        userInput.addEventListener('input', () => {
            userInput.style.height = 'auto';
            userInput.style.height = userInput.scrollHeight + 'px';
        });

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            if (welcome) welcome.style.display = 'none';
            userInput.value = '';
            userInput.style.height = 'auto';
            sendBtn.disabled = true;

            chatArea.innerHTML += `
                <div class="message-wrapper user-msg">
                    <div class="avatar user-avatar"><i class="fa-solid fa-user"></i></div>
                    <div class="message-content">${message}</div>
                </div>`;
            chatArea.scrollTop = chatArea.scrollHeight;

            const typingId = 'typing-' + Date.now();
            chatArea.innerHTML += `
                <div class="message-wrapper" id="${typingId}">
                    <div class="avatar bot-avatar"><i class="fa-solid fa-bolt"></i></div>
                    <div class="message-content"><div class="typing"><span></span><span></span></div></div>
                </div>`;
            chatArea.scrollTop = chatArea.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: message})
                });
                const data = await response.json();

                document.getElementById(typingId).innerHTML = `
                    <div class="avatar bot-avatar"><i class="fa-solid fa-bolt"></i></div>
                    <div class="message-content">${data.reply}</div>`;

            } catch (err) {
                document.getElementById(typingId).innerHTML = `
                    <div class="avatar bot-avatar"><i class="fa-solid fa-bolt"></i></div>
                    <div class="message-content">Error mama: Server ki connect avvatle</div>`;
            }
            sendBtn.disabled = false;
            chatArea.scrollTop = chatArea.scrollHeight;
        }
    </script>
</body>
</html>
